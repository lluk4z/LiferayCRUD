buildscript {
	dependencies {
		classpath group: "com.liferay", name: "com.liferay.portal.tools.rest.builder", version: "1.0.230"
	}

	repositories {
		mavenLocal()
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: "com.liferay.portal.tools.rest.builder"

subprojects {
	configurations.all {
		resolutionStrategy.force 'com.liferay:com.liferay.portal.vulcan.api:9.3.1'
	}
}
